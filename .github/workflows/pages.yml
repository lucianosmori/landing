name: Deploy to GitHub Pages

# Astro build + publish. Triggered only on push to v2.
# PoC branch (astro-poc-v2) does NOT deploy because of the branches filter.

on:
  push:
    branches: [v2]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run build
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4

  # Async, non-blocking Lighthouse audit on the live site.
  lighthouse-live:
    needs: deploy
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Wait for CDN to serve fresh content
        run: sleep 45
      - name: Lighthouse against live site
        uses: treosh/lighthouse-ci-action@v12
        with:
          configPath: .lighthouserc.live.json
          uploadArtifacts: true
          temporaryPublicStorage: true
