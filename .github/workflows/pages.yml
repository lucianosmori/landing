name: Deploy to GitHub Pages

on:
  push:
    branches: [v2]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: deployment
        uses: actions/deploy-pages@v4

  # Async, non-blocking Lighthouse audit on the live site.
  # Runs after deploy completes; never fails the workflow.
  # Reports archive as artifacts + temporary public storage URL.
  lighthouse-live:
    needs: deploy
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Wait for CDN to serve fresh content
        run: sleep 45
      - name: Lighthouse against live site
        uses: treosh/lighthouse-ci-action@v12
        with:
          configPath: .lighthouserc.live.json
          uploadArtifacts: true
          temporaryPublicStorage: true
