name: Lighthouse (PR preview)

# Audits the PR's checkout via lighthouse-ci's static-dist-dir mode against
# the Astro build output (dist/). Continues on regression so PRs stay mergeable;
# the action posts a comment with scores + a public report URL for review.

on:
  pull_request:
    branches: [v2, master]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: lighthouse-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  audit:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run build

      - name: Run Lighthouse on dist/
        uses: treosh/lighthouse-ci-action@v12
        with:
          configPath: .lighthouserc.pr.json
          uploadArtifacts: true
          temporaryPublicStorage: true
